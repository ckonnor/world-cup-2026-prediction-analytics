version: 2

seeds:
  - name: team_name_resolution
    description: Manual mapping from competition fixture names to resolved display names and historical-source model names.
    columns:
      - name: raw_team_name
        tests:
          - not_null
          - unique
      - name: display_team_name
        tests:
          - not_null
      - name: model_team_name
        tests:
          - not_null
      - name: resolution_type
        tests:
          - not_null

  - name: team_country_codes
    description: FIFA/FBref-style three-letter country codes used to join squad players to club player statistics.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: country_code
        tests:
          - not_null
          - unique
