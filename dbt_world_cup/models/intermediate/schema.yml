version: 2

models:
  - name: int_fixture_slots
    description: Unified fixture list for group-stage matches and knockout slot placeholders.
    columns:
      - name: match_id
        tests:
          - not_null
          - unique
      - name: competition_phase
        tests:
          - not_null
          - accepted_values:
              values: ["group", "knockout"]
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: home_team_model_name
        tests:
          - not_null
      - name: away_team_model_name
        tests:
          - not_null

  - name: int_historical_team_match_results
    description: One row per team per historical match, used to build form and strength features.
    columns:
      - name: result_id
        tests:
          - not_null
      - name: match_date
        tests:
          - not_null
      - name: team_name
        tests:
          - not_null
      - name: opponent_name
        tests:
          - not_null
      - name: goals_for
        tests:
          - not_null
      - name: goals_against
        tests:
          - not_null
      - name: match_result
        tests:
          - not_null
          - accepted_values:
              values: ["win", "draw", "loss"]
      - name: points
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 3]
              quote: false

  - name: int_team_form_rolling
    description: Per-team historical match rows with prior-match rolling form metrics.
    columns:
      - name: result_id
        tests:
          - not_null
      - name: match_date
        tests:
          - not_null
      - name: team_name
        tests:
          - not_null
      - name: prior_10_matches
        tests:
          - not_null

  - name: int_footystats_team_match_events
    description: One row per team per FootyStats match with corners, yellow cards, and red cards for/against.
    columns:
      - name: source_match_id
        tests:
          - not_null
      - name: team_name
        tests:
          - not_null
      - name: opponent_name
        tests:
          - not_null
      - name: corners_for
        tests:
          - not_null
      - name: yellow_cards_for
        tests:
          - not_null
      - name: red_cards_for
        tests:
          - not_null

  - name: int_squad_player_discipline
    description: 2026 squad players matched to top-five-league club player card and foul statistics when available.
    columns:
      - name: team_name
        tests:
          - not_null
      - name: player_name
        tests:
          - not_null
      - name: player_name_key
        tests:
          - not_null
      - name: has_club_player_stats
        tests:
          - not_null

  - name: int_transfermarkt_top_league_player_form
    description: Player-level top-league form since the 2022 World Cup, using Transfermarkt appearances, market values, and league-difficulty weights.
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: player_name
        tests:
          - not_null
      - name: player_star_power_index
        tests:
          - not_null

  - name: int_world_cup_squad_player_power
    description: World Cup squad players matched to Transfermarkt top-league form and scored with the player star-power proxy.
    columns:
      - name: team_name
        tests:
          - not_null
      - name: player_name
        tests:
          - not_null
      - name: team_player_power_rank
        tests:
          - not_null
      - name: player_star_power_index
        tests:
          - not_null

  - name: int_historical_match_rankings
    description: Point-in-time FIFA rankings joined to each historical match before kickoff.
    columns:
      - name: result_id
        tests:
          - not_null
          - unique
      - name: has_complete_fifa_rankings
        tests:
          - not_null
