version: 2

models:
  - name: dim_teams
    description: One row per concrete group-stage team.
    columns:
      - name: team_id
        tests:
          - not_null
          - unique
      - name: team_name
        tests:
          - not_null
          - unique
      - name: team_model_name
        tests:
          - not_null
      - name: group_letter
        tests:
          - not_null

  - name: fct_fixture_schedule
    description: Match schedule and slot labels for all 104 World Cup matches.
    columns:
      - name: match_id
        tests:
          - not_null
          - unique
      - name: competition_phase
        tests:
          - not_null
      - name: home_team_model_name
        tests:
          - not_null
      - name: away_team_model_name
        tests:
          - not_null

  - name: mart_team_strength
    description: Team-level historical strength snapshot as of the 2026 World Cup start date.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: historical_matches
        tests:
          - not_null
      - name: latest_match_date
        tests:
          - not_null
      - name: last_10_matches
        tests:
          - not_null
      - name: last_10_points_per_match
        tests:
          - not_null
      - name: last_10_goal_diff_per_match
        tests:
          - not_null

  - name: mart_squad_strength
    description: Team-level 2026 international-pedigree features built from player caps, goals, age, position, and club metadata.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: squad_players
        tests:
          - not_null
      - name: total_caps
        tests:
          - not_null
      - name: total_goals
        tests:
          - not_null
      - name: attacking_star_power_z
        tests:
          - not_null
      - name: defensive_experience_z
        tests:
          - not_null
      - name: overall_star_power_z
        tests:
          - not_null

  - name: mart_team_event_profile
    description: Team-level corners and card-risk profile built from FootyStats international events and club player discipline matches.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: avg_corners_for
        tests:
          - not_null
      - name: avg_corners_against
        tests:
          - not_null
      - name: blended_yellow_cards_for
        tests:
          - not_null
      - name: blended_red_cards_for
        tests:
          - not_null
      - name: international_event_matches
        tests:
          - not_null
      - name: matched_club_players
        tests:
          - not_null

  - name: mart_latest_fifa_rankings
    description: Latest FIFA men's world ranking snapshot by team.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: ranking_date
        tests:
          - not_null
      - name: fifa_rank
        tests:
          - not_null
      - name: fifa_points
        tests:
          - not_null

  - name: mart_external_player_strength
    description: Latest country-level player aggregate rating from the external international match-feature dataset.
    columns:
      - name: team_name
        tests:
          - not_null
          - unique
      - name: fifa_version
        tests:
          - not_null
      - name: avg_overall
        tests:
          - not_null
      - name: max_overall
        tests:
          - not_null
