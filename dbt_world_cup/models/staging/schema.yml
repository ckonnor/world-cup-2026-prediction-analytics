version: 2

models:
  - name: stg_group_fixtures
    description: Cleaned DataCamp group-stage fixture file.
    columns:
      - name: match_id
        description: Unique match identifier.
        tests:
          - not_null
          - unique
      - name: group_letter
        description: World Cup group from A through L.
        tests:
          - not_null
          - accepted_values:
              values: ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"]
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: match_date_utc
        tests:
          - not_null
      - name: venue
        tests:
          - not_null

  - name: stg_knockout_slots
    description: Cleaned DataCamp knockout-round slot file.
    columns:
      - name: match_id
        description: Unique knockout match identifier.
        tests:
          - not_null
          - unique
      - name: round_name
        tests:
          - not_null
      - name: score_multiplier
        tests:
          - not_null
      - name: match_date_utc
        tests:
          - not_null
      - name: venue
        tests:
          - not_null
      - name: slot_home
        tests:
          - not_null
      - name: slot_away
        tests:
          - not_null

  - name: stg_international_results
    description: Cleaned historical men's international football match results from the martj42 dataset.
    columns:
      - name: result_id
        description: Deterministic ID built from match date, teams, score, and tournament.
        tests:
          - not_null
          - unique
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: home_score
        tests:
          - not_null
      - name: away_score
        tests:
          - not_null
      - name: tournament
        tests:
          - not_null
      - name: neutral
        tests:
          - not_null

  - name: stg_shootouts
    description: Cleaned historical penalty shootout outcomes from the martj42 dataset.
    columns:
      - name: shootout_id
        description: Deterministic ID built from match date, teams, and shootout winner.
        tests:
          - not_null
          - unique
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: shootout_winner
        tests:
          - not_null
