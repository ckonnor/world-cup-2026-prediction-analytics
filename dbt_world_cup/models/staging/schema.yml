version: 2

models:
  - name: stg_group_fixtures
    description: Cleaned DataCamp group-stage fixture file with playoff placeholders resolved in the dbt layer.
    columns:
      - name: match_id
        description: Unique match identifier.
        tests:
          - not_null
          - unique
      - name: group_letter
        description: World Cup group from A through L.
        tests:
          - not_null
          - accepted_values:
              values: ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"]
      - name: home_team
        description: Display team name after fixture placeholder resolution.
        tests:
          - not_null
      - name: away_team
        description: Display team name after fixture placeholder resolution.
        tests:
          - not_null
      - name: home_team_raw
        description: Team value exactly as supplied by the raw DataCamp fixture file.
        tests:
          - not_null
      - name: away_team_raw
        description: Team value exactly as supplied by the raw DataCamp fixture file.
        tests:
          - not_null
      - name: home_team_model_name
        description: Team name aligned to the historical results source for feature joins.
        tests:
          - not_null
      - name: away_team_model_name
        description: Team name aligned to the historical results source for feature joins.
        tests:
          - not_null
      - name: match_date_utc
        tests:
          - not_null
      - name: venue
        tests:
          - not_null

  - name: stg_knockout_slots
    description: Cleaned DataCamp knockout-round slot file.
    columns:
      - name: match_id
        description: Unique knockout match identifier.
        tests:
          - not_null
          - unique
      - name: round_name
        tests:
          - not_null
      - name: score_multiplier
        tests:
          - not_null
      - name: match_date_utc
        tests:
          - not_null
      - name: venue
        tests:
          - not_null
      - name: slot_home
        tests:
          - not_null
      - name: slot_away
        tests:
          - not_null

  - name: stg_international_results
    description: Cleaned historical men's international football match results from the martj42 dataset.
    columns:
      - name: result_id
        description: Deterministic ID built from match date, teams, score, and tournament.
        tests:
          - not_null
          - unique
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: home_score
        tests:
          - not_null
      - name: away_score
        tests:
          - not_null
      - name: tournament
        tests:
          - not_null
      - name: neutral
        tests:
          - not_null

  - name: stg_shootouts
    description: Cleaned historical penalty shootout outcomes from the martj42 dataset.
    columns:
      - name: shootout_id
        description: Deterministic ID built from match date, teams, and shootout winner.
        tests:
          - not_null
          - unique
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: shootout_winner
        tests:
          - not_null

  - name: stg_world_cup_squads
    description: Cleaned 2026 World Cup squad/player table from Wikipedia.
    columns:
      - name: team_name
        tests:
          - not_null
      - name: player_name
        tests:
          - not_null
      - name: player_name_key
        tests:
          - not_null
      - name: position
        tests:
          - not_null
          - accepted_values:
              values: ["GK", "DF", "MF", "FW"]
      - name: age
        tests:
          - not_null
      - name: caps
        tests:
          - not_null
      - name: goals
        tests:
          - not_null
      - name: source_url
        tests:
          - not_null

  - name: stg_footystats_match_stats
    description: Cleaned FootyStats match-level event data for World Cups and 2026 qualification competitions.
    columns:
      - name: source_match_id
        tests:
          - not_null
          - unique
      - name: source_type
        tests:
          - not_null
          - accepted_values:
              values: ["qualification", "world_cup"]
      - name: source_weight
        tests:
          - not_null
      - name: match_date
        tests:
          - not_null
      - name: home_team_name
        tests:
          - not_null
      - name: away_team_name
        tests:
          - not_null
      - name: home_corners
        tests:
          - not_null
      - name: away_corners
        tests:
          - not_null
      - name: home_yellow_cards
        tests:
          - not_null
      - name: away_yellow_cards
        tests:
          - not_null
      - name: home_red_cards
        tests:
          - not_null
      - name: away_red_cards
        tests:
          - not_null

  - name: stg_club_player_stats
    description: Cleaned 2025/26 top-five-league club player statistics from KaggleHub, used for squad card-risk features.
    columns:
      - name: player_name
        tests:
          - not_null
      - name: player_name_key
        tests:
          - not_null
      - name: nation_code
        tests:
          - not_null
      - name: competition
        tests:
          - not_null
      - name: minutes
        tests:
          - not_null
      - name: yellow_cards
        tests:
          - not_null
      - name: red_cards
        tests:
          - not_null

  - name: stg_transfermarkt_appearances
    description: Transfermarkt player appearance rows from the Kaggle player-scores dataset.
    columns:
      - name: appearance_id
        tests:
          - not_null
          - unique
      - name: player_id
        tests:
          - not_null
      - name: competition_id
        tests:
          - not_null
      - name: appearance_date
        tests:
          - not_null
      - name: minutes_played
        tests:
          - not_null

  - name: stg_transfermarkt_competitions
    description: Transfermarkt competition metadata used to identify covered top leagues.
    columns:
      - name: competition_id
        tests:
          - not_null
          - unique
      - name: competition_name
        tests:
          - not_null

  - name: stg_transfermarkt_players
    description: Transfermarkt player profiles with citizenship, current club, market value, and national-team totals.
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: player_name
        tests:
          - not_null
      - name: player_name_key
        tests:
          - not_null

  - name: stg_fifa_rankings
    description: Historical and current FIFA men's world rankings normalized to one row per team per ranking date.
    columns:
      - name: ranking_date
        tests:
          - not_null
      - name: team_name
        tests:
          - not_null
      - name: country_code
        tests:
          - not_null
      - name: fifa_rank
        tests:
          - not_null
      - name: fifa_points
        tests:
          - not_null
      - name: source_system
        tests:
          - not_null
      - name: source_url
        tests:
          - not_null

  - name: stg_international_match_features
    description: External Kaggle match-feature table with Elo, player aggregate, and form features for historical international matches.
    columns:
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: home_goals
        tests:
          - not_null
      - name: away_goals
        tests:
          - not_null
      - name: external_home_elo
        tests:
          - not_null
      - name: external_away_elo
        tests:
          - not_null
      - name: source_dataset
        tests:
          - not_null

  - name: stg_international_player_aggregates
    description: External Kaggle country-level EA Sports/FIFA player aggregate ratings by game version.
    columns:
      - name: team_name
        tests:
          - not_null
      - name: fifa_version
        tests:
          - not_null
      - name: avg_overall
        tests:
          - not_null
      - name: max_overall
        tests:
          - not_null
