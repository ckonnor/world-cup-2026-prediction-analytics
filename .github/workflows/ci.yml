name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse dbt project
        run: dbt parse --project-dir dbt_world_cup --profiles-dir dbt_profiles

      - name: Build dbt project when raw files are present
        run: |
          if [ -f data/raw/group_fixtures.csv ] && [ -f data/raw/knockout_slots.csv ]; then
            dbt build --project-dir dbt_world_cup --profiles-dir dbt_profiles
          else
            echo "Skipping dbt build because DataCamp raw files are not committed yet."
          fi

      - name: Run Python smoke check
        run: python -m compileall src
