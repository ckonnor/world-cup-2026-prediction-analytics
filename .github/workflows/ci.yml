name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-analytics-project:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate dbt project graph
        run: dbt parse --project-dir dbt_world_cup --profiles-dir dbt_profiles

      - name: Run full dbt build when raw files are available
        run: |
          if [ -f data/raw/group_fixtures.csv ] && [ -f data/raw/knockout_slots.csv ]; then
            dbt build --project-dir dbt_world_cup --profiles-dir dbt_profiles
          else
            echo "Skipping dbt build because raw source CSVs are intentionally not committed."
          fi

      - name: Validate Python and Streamlit syntax
        run: python -m compileall src app tests

      - name: Run Python tests and dashboard data contracts
        run: pytest

      - name: Upload dbt parse artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-parse-artifacts
          path: |
            dbt_world_cup/target/manifest.json
            dbt_world_cup/target/semantic_manifest.json
            dbt_world_cup/target/partial_parse.msgpack
          if-no-files-found: ignore
